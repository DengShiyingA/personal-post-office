<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人邮局 · 登录</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/login.css" />
</head>
<body class="login-page">

  <div class="login-logo">
    <span class="logo-icon">✉️</span>
    <div class="logo-name">个人邮局</div>
    <div class="logo-tagline">Personal Post Office</div>
  </div>

  <div class="login-card">
    <h2>欢迎回来</h2>
    <p class="login-sub">登录你的个人邮局账户</p>

    <div class="login-error" id="loginError">邮箱或密码错误，请重试。</div>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="email">邮箱地址</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input class="input" type="email" id="email" name="email"
            placeholder="your@example.com" required autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <div class="input-wrap password-wrap">
          <span class="input-icon">🔒</span>
          <input class="input" type="password" id="password" name="password"
            placeholder="请输入密码" required autocomplete="current-password" />
          <span class="toggle-pw" id="togglePw" title="显示/隐藏密码">👁</span>
        </div>
      </div>

      <div class="login-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember" name="remember" />
          记住我
        </label>
        <a href="#" class="forgot-link">忘记密码？</a>
      </div>

      <button type="submit" class="btn btn-primary btn-login">登录</button>
    </form>

    <div class="login-demo-hint" id="loginHint">
      正在检测服务器配置…
    </div>
  </div>

  <div class="login-footer">
    © 2026 个人邮局 &nbsp;·&nbsp;
    <a href="#">隐私政策</a> &nbsp;·&nbsp;
    <a href="#">服务条款</a>
  </div>

  <script>
    const form    = document.getElementById('loginForm');
    const errEl   = document.getElementById('loginError');
    const hintEl  = document.getElementById('loginHint');
    const togglePw = document.getElementById('togglePw');
    const pwInput  = document.getElementById('password');
    const btn      = form.querySelector('.btn-login');

    // 检测已有会话
    const user = JSON.parse(localStorage.getItem('ppo_user') || 'null');
    if (user && user.loggedIn) { window.location.href = 'app.html'; }

    // 密码显示切换
    togglePw.addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      togglePw.textContent = isText ? '👁' : '🙈';
    });

    // 恢复记住的邮箱
    const savedEmail = localStorage.getItem('ppo_email');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
      document.getElementById('remember').checked = true;
    }

    // 检测服务器模式
    (async () => {
      try {
        const resp = await fetch('api/server-config.php');
        const data = await resp.json();
        if (data.ok && data.data && data.data.host) {
          hintEl.innerHTML = '✓ 邮件服务器已就绪';
        } else {
          hintEl.innerHTML = '演示模式：任意邮箱 + 任意密码均可登录';
        }
      } catch (e) {
        hintEl.innerHTML = '演示模式：任意邮箱 + 任意密码均可登录';
      }
    })();

    // 登录提交
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;

      if (!email || !password) {
        errEl.textContent = '请填写邮箱和密码';
        errEl.classList.add('show');
        return;
      }
      errEl.classList.remove('show');
      btn.textContent = '登录中…';
      btn.disabled = true;

      try {
        // 调用 PHP 登录接口
        const resp = await fetch('api/login.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await resp.json();

        if (!data.ok) throw new Error(data.error || '登录失败');

        const { token, user: u, demo } = data.data;

        if (remember) localStorage.setItem('ppo_email', email);
        else localStorage.removeItem('ppo_email');

        localStorage.setItem('ppo_token', token);
        localStorage.setItem('ppo_user', JSON.stringify({ ...u, loggedIn: true, demo: !!demo }));

        // 显示登录成功
        errEl.style.cssText = 'background:#e8f7e8;border:1px solid #90c290;color:#2e7d32';
        errEl.textContent = '✓ 登录成功，正在进入…';
        errEl.classList.add('show');
        btn.textContent = '✓ 成功';
        setTimeout(() => { window.location.href = 'app.html'; }, 700);

      } catch (err) {
        // PHP 不可用时退回纯本地 Mock 模式
        if (err.message === 'Failed to fetch' || err.name === 'TypeError') {
          const userName = email.split('@')[0];
          const name = userName.charAt(0).toUpperCase() + userName.slice(1);
          localStorage.setItem('ppo_token', 'demo-' + btoa(email));
          localStorage.setItem('ppo_user', JSON.stringify({
            email, name, avatar: name.charAt(0), loggedIn: true, demo: true
          }));
          if (remember) localStorage.setItem('ppo_email', email);
          else localStorage.removeItem('ppo_email');
          errEl.style.cssText = 'background:#e8f7e8;border:1px solid #90c290;color:#2e7d32';
          errEl.textContent = '✓ 登录成功（演示模式），正在进入…';
          errEl.classList.add('show');
          btn.textContent = '✓ 成功';
          setTimeout(() => { window.location.href = 'app.html'; }, 700);
          return;
        }
        errEl.style.cssText = '';
        errEl.textContent = err.message || '登录失败，请重试';
        errEl.classList.add('show');
        btn.textContent = '登录';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
